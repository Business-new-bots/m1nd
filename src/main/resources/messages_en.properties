habits.pattern.problem.emotion=Problem: an emotional barrier prevents you from starting.
habits.pattern.problem.trigger=Problem: there is no stable trigger and no simple launch scenario.
habits.pattern.solutions.title=Solution path:
habits.pattern.solutions.1=1) Attach the habit to a stable trigger (after breakfast/after work).
habits.pattern.solutions.2=2) Lower friction: first step is 2-5 minutes, no perfectionism.
habits.pattern.solutions.3=3) Fix time and minimal format for 7 days, then review the result.
