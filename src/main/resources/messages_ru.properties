assistant.greeting.prefix.thinking=Привет, я твой ИИ-агент мыслитель. 
assistant.greeting.prefix.default=Привет. 
assistant.greeting.body=Обещаю, что наше общение с тобой будет конфеденциальным. Я помогу тебе найти верное решение и интересующие тебя ответы. А если не найду решение, отправлю твой вопрос основателю и он точно тебе поможет! Что ты хочешь спросить?
