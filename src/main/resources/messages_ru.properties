start.welcome.text=Добро пожаловать в ваш личный помощник по решению задач.\n\nЧем могу помочь? Для вашего удобства доступны два формата поддержки:\n\nAI Assistant — молниеносная скорость и точность от ИИ-асситентов.\nHuman Expert — индивидуальный подход и экспертиза от реальных специалистов.\n\nНапишите суть вопроса, и я порекомендую, кто справится с ним лучше: нейросеть или живой профессионал.
